<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gilroy Flappy Bird Style Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(#7bd7ff, #d8f6ff);
      font-family: Arial, Helvetica, sans-serif;
      padding: 16px;
      color: #123;
    }
    .wrap { display: grid; gap: 12px; justify-items: center; }
    .hud {
      width: min(92vw, 420px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      font-size: 18px;
      font-weight: 700;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #ffce31;
      color: #111;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 0 #c18f00;
    }
    button:active { transform: translateY(3px); box-shadow: 0 1px 0 #c18f00; }
    canvas {
      width: min(92vw, 420px);
      height: auto;
      border: 4px solid #1b6d89;
      border-radius: 18px;
      background: #7bd7ff;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      touch-action: manipulation;
    }
    .message {
      width: min(92vw, 420px);
      min-height: 24px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #14384a;
    }
    .tap-button {
      width: min(92vw, 420px);
      font-size: 20px;
      padding: 16px;
      border-radius: 18px;
      background: #ffce31;
    }
    .small { width: min(92vw, 420px); text-align: center; font-size: 13px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Best: <span id="best">0</span></div>
      <button id="restartBtn">Restart</button>
    </div>

    <canvas id="game" width="420" height="620" aria-label="Gilroy Flappy Bird style game"></canvas>
    <div class="message" id="message">Press Space, click, or tap to flap.</div>
    <button class="tap-button" id="flapBtn">TAP / FLAP</button>
    <div class="small">Avoid the pipes. Each pipe you pass gives 1 point.</div>
  </div>

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;
    const GRAVITY = 0.38;
    const FLAP_FORCE = -7.4;
    const PIPE_WIDTH = 66;
    const PIPE_GAP = 165;
    const PIPE_SPEED = 2.6;
    const PIPE_INTERVAL = 1450;
    const GROUND_HEIGHT = 84;

    let bestScore = Number(localStorage.getItem('gilroyFlappyBestScore') || 0);
    bestEl.textContent = bestScore;
    let state;
    let lastTime = 0;
    let pipeTimer = 0;

    function makeState() {
      return {
        bird: { x: 95, y: HEIGHT / 2, radius: 22, velocity: 0, rotation: 0 },
        pipes: [],
        score: 0,
        started: false,
        gameOver: false,
        clouds: [
          { x: 50, y: 85, size: 32 },
          { x: 230, y: 145, size: 24 },
          { x: 355, y: 70, size: 28 }
        ]
      };
    }

    function updateHUD() {
      scoreEl.textContent = state.score;
      bestEl.textContent = bestScore;
    }

    function setMessage(text) { messageEl.textContent = text; }

    function randomPipeY() {
      const topLimit = 90;
      const bottomLimit = HEIGHT - GROUND_HEIGHT - PIPE_GAP - 90;
      return Math.floor(topLimit + Math.random() * (bottomLimit - topLimit));
    }

    function addPipe() {
      const topHeight = randomPipeY();
      state.pipes.push({ x: WIDTH + 20, topHeight, bottomY: topHeight + PIPE_GAP, passed: false });
    }

    function flap() {
      if (state.gameOver) { restart(); return; }
      if (!state.started) { state.started = true; setMessage(''); }
      state.bird.velocity = FLAP_FORCE;
    }

    function restart() {
      state = makeState();
      pipeTimer = PIPE_INTERVAL;
      lastTime = performance.now();
      setMessage('Press Space, click, or tap to flap.');
      updateHUD();
    }

    function circleRectCollision(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return (dx * dx + dy * dy) < circle.radius * circle.radius;
    }

    function endGame() {
      if (state.gameOver) return;
      state.gameOver = true;
      setMessage('Game over! Press Restart or tap to play again.');
      if (state.score > bestScore) {
        bestScore = state.score;
        localStorage.setItem('gilroyFlappyBestScore', bestScore);
      }
      updateHUD();
    }

    function update(delta) {
      if (!state.started || state.gameOver) return;
      const bird = state.bird;
      bird.velocity += GRAVITY;
      bird.y += bird.velocity;
      bird.rotation = Math.max(-0.6, Math.min(1.2, bird.velocity * 0.08));

      pipeTimer += delta;
      if (pipeTimer >= PIPE_INTERVAL) { pipeTimer = 0; addPipe(); }

      for (const pipe of state.pipes) {
        pipe.x -= PIPE_SPEED;
        if (!pipe.passed && pipe.x + PIPE_WIDTH < bird.x) {
          pipe.passed = true;
          state.score++;
          updateHUD();
        }
      }

      state.pipes = state.pipes.filter(pipe => pipe.x + PIPE_WIDTH > -20);

      if (bird.y - bird.radius < 0) { bird.y = bird.radius; bird.velocity = 0; }
      if (bird.y + bird.radius > HEIGHT - GROUND_HEIGHT) endGame();

      for (const pipe of state.pipes) {
        const topRect = { x: pipe.x, y: 0, w: PIPE_WIDTH, h: pipe.topHeight };
        const bottomRect = { x: pipe.x, y: pipe.bottomY, w: PIPE_WIDTH, h: HEIGHT - GROUND_HEIGHT - pipe.bottomY };
        if (circleRectCollision(bird, topRect) || circleRectCollision(bird, bottomRect)) endGame();
      }
    }

    function drawCloud(x, y, size) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.82)';
      ctx.beginPath();
      ctx.arc(x, y, size * 0.55, 0, Math.PI * 2);
      ctx.arc(x + size * 0.45, y - size * 0.25, size * 0.48, 0, Math.PI * 2);
      ctx.arc(x + size * 0.92, y, size * 0.55, 0, Math.PI * 2);
      ctx.arc(x + size * 0.45, y + size * 0.18, size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      sky.addColorStop(0, '#72d8ff');
      sky.addColorStop(0.75, '#b7f0ff');
      sky.addColorStop(1, '#dff9ff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      for (const cloud of state.clouds) drawCloud(cloud.x, cloud.y, cloud.size);
    }

    function drawPipes() {
      for (const pipe of state.pipes) {
        drawPipe(pipe.x, 0, PIPE_WIDTH, pipe.topHeight, true);
        drawPipe(pipe.x, pipe.bottomY, PIPE_WIDTH, HEIGHT - GROUND_HEIGHT - pipe.bottomY, false);
      }
    }

    function drawPipe(x, y, w, h, upsideDown) {
      ctx.fillStyle = '#34b233';
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#208f25';
      ctx.fillRect(x + w - 14, y, 14, h);
      ctx.fillStyle = '#67d65c';
      ctx.fillRect(x + 8, y, 12, h);
      const lipH = 24;
      const lipY = upsideDown ? y + h - lipH : y;
      ctx.fillStyle = '#2cab32';
      ctx.fillRect(x - 7, lipY, w + 14, lipH);
      ctx.strokeStyle = '#16631b';
      ctx.lineWidth = 3;
      ctx.strokeRect(x - 7, lipY, w + 14, lipH);
    }

    function drawGround() {
      ctx.fillStyle = '#d9a449';
      ctx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, GROUND_HEIGHT);
      ctx.fillStyle = '#70c744';
      ctx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, 18);
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.12)';
      ctx.lineWidth = 2;
      for (let x = 0; x < WIDTH; x += 32) {
        ctx.beginPath();
        ctx.moveTo(x, HEIGHT - GROUND_HEIGHT + 20);
        ctx.lineTo(x + 18, HEIGHT);
        ctx.stroke();
      }
    }

    function drawBird() {
      const bird = state.bird;
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(bird.rotation);

      // Small trail behind the logo
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-34, 8);
      ctx.lineTo(-58, 24);
      ctx.moveTo(-32, -2);
      ctx.lineTo(-62, 10);
      ctx.stroke();

      if (logoImage.complete) {
        const size = bird.radius * 2.6;
        ctx.drawImage(logoImage, -size / 2, -size / 2, size, size);
      } else {
        ctx.fillStyle = '#ffce31';
        ctx.beginPath();
        ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawOverlay() {
      if (!state.started && !state.gameOver) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.82)';
        ctx.fillRect(42, 210, WIDTH - 84, 110);
        ctx.strokeStyle = '#1b6d89';
        ctx.lineWidth = 3;
        ctx.strokeRect(42, 210, WIDTH - 84, 110);
        ctx.fillStyle = '#14384a';
        ctx.font = 'bold 30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GILROY FLAPPY', WIDTH / 2, 250);
        ctx.font = '16px Arial';
        ctx.fillText('Space / Click / Tap to start', WIDTH / 2, 282);
      }

      if (state.gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.58)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 38px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, HEIGHT / 2 - 34);
        ctx.font = '22px Arial';
        ctx.fillText(`Score: ${state.score}`, WIDTH / 2, HEIGHT / 2 + 4);
        ctx.fillText(`Best: ${bestScore}`, WIDTH / 2, HEIGHT / 2 + 34);
        ctx.font = '16px Arial';
        ctx.fillText('Press Restart or tap to play again', WIDTH / 2, HEIGHT / 2 + 72);
      }
    }

    function draw() {
      drawBackground();
      drawPipes();
      drawGround();
      drawBird();
      drawOverlay();
    }

    function loop(timestamp) {
      const delta = timestamp - lastTime;
      lastTime = timestamp;
      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
    }, { passive: false });

    canvas.addEventListener('click', flap);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });
    flapBtn.addEventListener('click', flap);
    flapBtn.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });
    restartBtn.addEventListener('click', restart);

    restart();
    requestAnimationFrame((timestamp) => { lastTime = timestamp; loop(timestamp); });
  </script>
